<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Login</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            background: #f5f7f6;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 14px;
            padding: 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .subtitle {
            color: #5f6b7a;
            margin-bottom: 28px;
        }

        .input-container {
            margin: 16px 0;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #25313f;
        }

        .input-row {
            display: flex;
            align-items: center;
        }

        input {
            padding: 12px;
            width: 100%;
            border: 1px solid #cdd5df;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .icon {
            font-size: 20px;
            margin-left: 10px;
            min-width: 22px;
        }

        .valid { color: green; }
        .invalid { color: red; }

        button {
            padding: 12px 20px;
            margin-top: 22px;
            cursor: pointer;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #2e7d32;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #256729;
        }

        .note {
            margin-top: 14px;
            color: #5f6b7a;
            font-size: 14px;
        }

        footer {
            background-color: #2e7d32;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="content">
    <div class="login-card">
        <h1>E-Commerce Login</h1>
        <p class="subtitle">Sign in to continue to the product catalog.</p>

        <div class="input-container">
            <label for="email">Email</label>
            <div class="input-row">
                <input type="text" id="email" placeholder="Email" onkeyup="validateEmail()">
                <span id="emailIcon" class="icon"></span>
            </div>
        </div>

        <div class="input-container">
            <label for="password">Password</label>
            <div class="input-row">
                <input type="password" id="password" placeholder="Password" onkeyup="validatePassword()">
                <span id="passwordIcon" class="icon"></span>
            </div>
        </div>

        <button onclick="login()">Login</button>
        <div class="note">Demo flow: Login → Product Page → Order & Payment</div>
    </div>
</div>

<footer>
    <p>Team 10 | Integration With Payment Provider &amp; Handle Ecommerce Payment Flows</p>
</footer>

<script>
function validateEmail() {
    const email = document.getElementById("email").value.trim();
    const icon = document.getElementById("emailIcon");
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (emailPattern.test(email)) {
        icon.innerHTML = "✔";
        icon.className = "icon valid";
        return true;
    } else {
        icon.innerHTML = "✖";
        icon.className = "icon invalid";
        return false;
    }
}

function validatePassword() {
    const password = document.getElementById("password").value;
    const icon = document.getElementById("passwordIcon");

    if (password.length >= 6) {
        icon.innerHTML = "✔";
        icon.className = "icon valid";
        return true;
    } else {
        icon.innerHTML = "✖";
        icon.className = "icon invalid";
        return false;
    }
}

function login() {
    const emailValid = validateEmail();
    const passwordValid = validatePassword();

    if (emailValid && passwordValid) {
        sessionStorage.setItem("loggedInUserEmail", document.getElementById("email").value.trim());
        window.location.href = "product_page.html";
    } else {
        alert("Please enter a valid email and password.");
    }
}
</script>

</body>
</html>
